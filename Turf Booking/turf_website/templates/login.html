{% extends "base.html" %}

{% block title %}Log In - Turf Booking{% endblock %}

{% block content %}
<div class="container">
<div class="form-container">
    <div class="form-header">
        <h2>Log in to your account</h2>
        <p>Enter your details below to access your dashboard</p>
    </div>
    
    <div class="card">
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-icon-wrapper">
                    <!-- Mail icon -->
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon-wrapper">
                    <!-- Lock icon -->
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="password" name="password" placeholder="••••••••" required style="padding-right: 2.5rem;">
                    <button type="button" onclick="togglePassword('password', this)" style="position: absolute; right: 12px; background: none; border: none; color: var(--muted-foreground); cursor: pointer; display: flex; align-items: center; padding: 0;" title="Toggle Password Visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Sign In
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem; color: var(--muted-foreground); font-size: 0.875rem;">
            Don't have an account? 
            <a href="{{ url_for('signup') }}" style="color: var(--foreground); font-weight: 500; text-decoration: underline; text-underline-offset: 4px;">Sign up</a>
        </p>
    </div>
</div>
</div>

<script>
    function togglePassword(inputId, button) {
        var input = document.getElementById(inputId);
        var svg = button.querySelector('svg');
        if (input.type === "password") {
            input.type = "text";
            svg.innerHTML = '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>';
        } else {
            input.type = "password";
            svg.innerHTML = '<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/>';
        }
    }
</script>
{% endblock %}
